<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_LOGIN</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            background-color: #050505;
            color: #39ff14;
            font-family: 'Courier New', Courier, monospace;
            height: 100%;
            overflow: hidden;
        }
        /* Scanline CRT effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }
        .terminal {
            padding: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
        }
        .line {
            margin-bottom: 8px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .input-area {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }
        .prompt {
            margin-right: 10px;
            font-weight: bold;
        }
        input {
            background: transparent;
            border: none;
            color: #39ff14;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
        }

        /* Red Glowing Effect + Smooth Pulse Animation */
        .glow-red {
            color: #ff3333 !important;
            text-shadow: 0 0 5px #ff3333, 0 0 15px #ff0000, 0 0 25px #ff0000;
            font-weight: bold;
            display: inline-block; /* Required for transform scaling to work correctly */
            transform-origin: left center; /* Keeps text aligned properly in the terminal log */
            animation: pulse-size 2s ease-in-out infinite;
        }

        @keyframes pulse-size {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2); /* Grows slightly bigger */
            }
            100% {
                transform: scale(1); /* Shrinks back smoothly */
            }
        }

        /* reCAPTCHA Styling */
        #captcha-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 30;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .captcha-box {
            background: #fff;
            width: 100%;
            max-width: 350px;
            padding: 7px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            font-family: Roboto, Arial, sans-serif;
        }
        .captcha-header {
            background: #4a90e2;
            color: #fff;
            padding: 16px;
        }
        .captcha-header span { font-size: 14px; }
        .captcha-header strong { font-size: 22px; display: block; margin-top: 2px;}
        
        .captcha-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 2px;
            margin-top: 5px;
            background: #ccc;
        }
        .captcha-tile {
            aspect-ratio: 1;
            background-size: 300% 300%;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s ease;
        }
        .captcha-tile.selected {
            transform: scale(0.92);
        }
        .captcha-tile.selected::after {
            content: "✓";
            position: absolute;
            top: 5px; left: 5px;
            background: #4a90e2;
            color: white;
            width: 20px; height: 20px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold;
        }
        
        /* Positioning background slices mapping to your exact image file */
        .t1 { background-image: url('IMG_20260627_173832_174(2).jpg'); background-position: 0% 0%; }
        .t2 { background-image: url('IMG_20260627_173832_174(2).jpg'); background-position: 50% 0%; }
        .t3 { background-image: url('IMG_20260627_173832_174(2).jpg'); background-position: 100% 0%; }
        .t4 { background-image: url('IMG_20260627_173832_174(2).jpg'); background-position: 0% 50%; }
        .t5 { background-image: url('IMG_20260627_173832_174(2).jpg'); background-position: 50% 50%; }
        .t6 { background-image: url('IMG_20260627_173832_174(2).jpg'); background-position: 100% 50%; }
        .t7 { background-image: url('IMG_20260627_173832_174(2).jpg'); background-position: 0% 100%; }
        .t8 { background-image: url('IMG_20260627_173832_174(2).jpg'); background-position: 50% 100%; }
        .t9 { background-image: url('IMG_20260627_173832_174(2).jpg'); background-position: 100% 100%; }

        .captcha-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px 5px 5px;
        }
        .captcha-verify-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 10px 18px;
            font-weight: bold;
            border-radius: 2px;
            cursor: pointer;
            font-size: 14px;
        }
        .matrix-scroll { color: #0f0; font-size: 11px; opacity: 0.7; }

        /* Video Display Stage */
        #video-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 40;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            max-height: 85vh;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="terminal" id="terminal" onclick="focusInput()">
        <div id="log">
            <div class="line">=== SECURE CHANNEL TERMINAL v3.1.9 ===</div>
            <div class="line">---------------------------------</div>
        </div>
        <div class="input-area" id="input-container">
            <span class="prompt">ENTER YOUR CODE NAME:</span>
            <input type="text" id="user-input" autofocus autocomplete="off" autocapitalize="off" spellcheck="false">
        </div>
    </div>

    <div id="captcha-overlay">
        <div class="captcha-box">
            <div class="captcha-header">
                <span>VALIDATION CHECK</span>
                <span>Select all squares with</span>
                <strong>parts you are in</strong>
            </div>
            <div class="captcha-grid">
                <div class="captcha-tile t1" onclick="toggleTile(this)"></div>
                <div class="captcha-tile t2" onclick="toggleTile(this)"></div>
                <div class="captcha-tile t3" onclick="toggleTile(this)"></div>
                <div class="captcha-tile t4" onclick="toggleTile(this)"></div>
                <div class="captcha-tile t5" onclick="toggleTile(this)"></div>
                <div class="captcha-tile t6" onclick="toggleTile(this)"></div>
                <div class="captcha-tile t7" onclick="toggleTile(this)"></div>
                <div class="captcha-tile t8" onclick="toggleTile(this)"></div>
                <div class="captcha-tile t9" onclick="toggleTile(this)"></div>
            </div>
            <div class="captcha-footer">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#555"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                <button class="captcha-verify-btn" onclick="verifyCaptcha()">VERIFY</button>
            </div>
        </div>
    </div>

    <div id="video-container">
        <video id="birthday-video" controls playsinline loop>
            <source src="video5332262362533632691.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        const log = document.getElementById('log');
        const userInput = document.getElementById('user-input');
        const inputContainer = document.getElementById('input-container');
        const captchaOverlay = document.getElementById('captcha-overlay');
        const videoContainer = document.getElementById('video-container');
        const video = document.getElementById('birthday-video');

        function focusInput() { userInput.focus(); }

        function writeLine(text, className = "") {
            const div = document.createElement('div');
            div.className = `line ${className}`;
            div.innerText = text;
            log.appendChild(div);
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        }

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                let codename = userInput.value.trim();
                if (codename === "") return;
                userInput.value = "";
                inputContainer.style.display = 'none';

                writeLine(`ENTER CODE NAME: ${codename}`);
                writeLine("INITIALIZING SECURITY HANDSHAKE...");

                setTimeout(() => {
                    writeLine("CRITICAL: BOT DETECTED. TRIGGERING CAPTCHA CHALLENGE.");
                    setTimeout(() => {
                        captchaOverlay.style.display = 'flex';
                    }, 2000);
                }, 1200);
            }
        });

        function toggleTile(tile) {
            tile.classList.toggle('selected');
        }

        function verifyCaptcha() {
            captchaOverlay.style.display = 'none';
            writeLine("CAPTCHA BYPASS: SUCCESSFUL.");
            writeLine("DECRYPTING DATA PAYLOAD...");
            
            let iterations = 0;
            const interval = setInterval(() => {
                let fakeData = `[0x${Math.random().toString(16).substr(2, 8)}] ` + 
                               Array.from({length: 4}, () => Math.floor(Math.random()*1000000).toString(2)).join(' ');
                writeLine(fakeData, "matrix-scroll");
                iterations++;

                if (iterations > 25) {
                    clearInterval(interval);
                    writeLine("EXECUTION SUCCESSFUL. HAPPY BIRTHDAY HEYDARIIIII JAN!", "glow-red");
                    
                    setTimeout(() => {
                        videoContainer.style.display = 'flex';
                        video.play().catch(error => {
                            console.log("Autoplay restrictions handled. Player controls ready.");
                        });
                    }, 5000);
                }
            }, 60);
        }
    </script>
</body>
</html>
